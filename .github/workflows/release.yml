name: Release

# Every push to main: derive the next version from conventional commits since
# the last tag (feat → minor, fix → patch), build the .dmg, and publish a
# PUBLIC "Latest" GitHub release. Pushes with no feat/fix commit make no
# release. A major bump (X+1.0.0) is manual only: Actions → Release →
# "Run workflow" → bump = major.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "auto = feat/fix from commits · major = X+1.0.0"
        type: choice
        options: [auto, major]
        default: auto

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false      # queue overlapping pushes, never race a version

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history → tags + commit count

      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ github.event.inputs.bump || 'auto' }}
        run: sh scripts/next-version.sh

      - name: Nothing to release
        if: steps.ver.outputs.should_release != 'true'
        run: echo "No feat/fix commits since the last tag — skipping."

      # xcodegen emits the Xcode 16+ pbxproj format (objectVersion 77); the
      # runner's default Xcode 15.4 can't open it. Pin to latest stable.
      - name: Select Xcode
        if: steps.ver.outputs.should_release == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tooling
        if: steps.ver.outputs.should_release == 'true'
        run: brew install xcodegen create-dmg

      - name: Sync version into project
        if: steps.ver.outputs.should_release == 'true'
        run: |
          printf '%s\n' "${{ steps.ver.outputs.version }}" > VERSION
          sh scripts/sync-version.sh

      - name: Generate Xcode project
        if: steps.ver.outputs.should_release == 'true'
        run: xcodegen generate

      - name: Archive (Release, ad-hoc)
        if: steps.ver.outputs.should_release == 'true'
        run: |
          xcodebuild -project SideNote.xcodeproj -scheme SideNote \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/SideNote.xcarchive" archive

      - name: Build .dmg
        if: steps.ver.outputs.should_release == 'true'
        run: |
          app="$RUNNER_TEMP/SideNote.xcarchive/Products/Applications/HoverNote.app"
          test -d "$app" || { echo "::error::no HoverNote.app in archive"; exit 1; }
          create-dmg \
            --volname "HoverNote" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "HoverNote.app" 175 200 \
            --hide-extension "HoverNote.app" \
            --app-drop-link 425 200 \
            "HoverNote-${{ steps.ver.outputs.version }}.dmg" "$app"

      # Direct-to-main flow → no PRs → GitHub's built-in
      # generate_release_notes only emits a compare link. Build notes ourselves
      # by bucketing conventional commits since the previous tag.
      - name: Build release notes
        if: steps.ver.outputs.should_release == 'true'
        env:
          NEW_TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          prev=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -n "$prev" ]; then range="${prev}..HEAD"; else range="HEAD"; fi

          subjects=$(git log $range --no-merges --pretty='%s')
          feats=$(printf '%s\n' "$subjects" | grep -E '^feat(\(.+\))?!?:' \
                  | sed -E 's/^feat(\(.+\))?!?: */- /' || true)
          fixes=$(printf '%s\n' "$subjects" | grep -E '^fix(\(.+\))?!?:'  \
                  | sed -E 's/^fix(\(.+\))?!?: */- /' || true)
          others=$(printf '%s\n' "$subjects" | grep -Ev '^(feat|fix)(\(.+\))?!?:' \
                  | grep -v '^$' | sed 's/^/- /' || true)

          {
            [ -n "$feats"  ] && { echo "### Added";   echo; echo "$feats";  echo; }
            [ -n "$fixes"  ] && { echo "### Fixed";   echo; echo "$fixes";  echo; }
            if [ -n "$others" ]; then
              echo "<details><summary>Other changes</summary>"; echo
              echo "$others"; echo
              echo "</details>"; echo
            fi
            [ -n "$prev" ] && echo "**Full Changelog**: https://github.com/${REPO}/compare/${prev}...${NEW_TAG}"
          } > RELEASE_NOTES.md

          echo "::group::Release notes"
          cat RELEASE_NOTES.md
          echo "::endgroup::"

      - name: Publish public release
        if: steps.ver.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "HoverNote ${{ steps.ver.outputs.tag }}"
          draft: false                  # public immediately
          prerelease: false
          make_latest: true
          body_path: RELEASE_NOTES.md   # custom notes (see Build release notes)
          files: "HoverNote-*.dmg"
          fail_on_unmatched_files: true
